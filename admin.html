<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Minh Tấn Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        /* CSS BỔ SUNG CHO DASHBOARD MỚI */
        .filter-panel { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; padding: 20px; }
        .filter-group { flex: 1; min-width: 200px; position: relative; }
        .filter-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .filter-group input, .filter-group select { width: 100%; padding: 12px 12px 12px 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; }
        
        .btn-icon { width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; transition: 0.3s; margin-right: 5px; }
        .btn-icon.edit { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .btn-icon.delete { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .btn-icon:hover { transform: scale(1.1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { width: 100%; max-width: 500px; padding: 30px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #888; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }

        .status-badge { padding: 4px 10px; border-radius: 50px; font-size: 12px; font-weight: bold; }
        .status-paid { background: #27ae60; color: white; }
        .status-lead { background: #f1c40f; color: black; }
        .status-cancel { background: #c0392b; color: white; }
    </style>
</head>
<body class="dark-theme">
    <div id="login-screen" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="card" style="width: 350px; padding: 40px; text-align: center;">
            <i class="fas fa-lock" style="font-size: 40px; margin-bottom: 20px; color: #06403D;"></i>
            <h2>Admin Login</h2>
            <input type="password" id="admin-pass" placeholder="Nhập mật khẩu..." style="width: 100%; margin: 20px 0; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            <button class="btn-primary" onclick="checkLogin()" style="width: 100%;">Truy cập ngay</button>
        </div>
    </div>

    <div id="admin-dashboard" style="display: none;">
        <div class="admin-container">
            <aside class="sidebar">
                <div class="sidebar-logo"><i class="fas fa-camera-retro"></i> <span>TẤN CRM</span></div>
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" onclick="switchTab('leads')"><i class="fas fa-users"></i> Học Viên</a>
                    <a href="#" class="nav-item" onclick="switchTab('cms')"><i class="fas fa-edit"></i> Website CMS</a>
                    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                </nav>
            </aside>

            <main class="main-content">
                <section id="tab-leads" class="tab-content active">
                    <header class="dashboard-header">
                        <h1>Quản lý Học viên</h1>
                        <div class="header-actions">
                            <button class="btn-primary" onclick="exportToCSV()"><i class="fas fa-download"></i> Xuất dữ liệu</button>
                        </div>
                    </header>

                    <!-- FILTERS -->
                    <div class="filter-panel card">
                        <div class="filter-group">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-box" placeholder="Tìm theo tên, sđt..." oninput="applyFilters()">
                        </div>
                        <div class="filter-group">
                            <i class="fas fa-filter"></i>
                            <select id="filter-status" onchange="applyFilters()">
                                <option value="all">Tất cả trạng thái</option>
                                <option value="PAID">Đã thanh toán (PAID)</option>
                                <option value="LEAD">Chờ xử lý (LEAD)</option>
                                <option value="CANCEL">Đã hủy (CANCEL)</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <i class="fas fa-calendar-week"></i>
                            <select id="filter-date" onchange="applyFilters()">
                                <option value="all">Tất cả thời gian</option>
                                <option value="today">Hôm nay</option>
                                <option value="week">Trong tuần này</option>
                                <option value="month">Trong tháng này</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-container card">
                        <table>
                            <thead>
                                <tr>
                                    <th>Thời gian</th>
                                    <th>Họ và Tên</th>
                                    <th>SĐT</th>
                                    <th>Email</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="student-list"></tbody>
                        </table>
                    </div>
                </section>

                <section id="tab-cms" class="tab-content">
                    <header class="dashboard-header">
                        <h1>Website CMS</h1>
                        <button class="btn-primary" onclick="saveCMS()">Lưu thay đổi</button>
                    </header>
                    <div id="cms-fields" class="cms-grid"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="modal">
        <div class="modal-content card">
            <h3>Sửa thông tin học viên</h3>
            <form id="edit-form">
                <input type="hidden" id="old-phone">
                <div class="form-group"><label>Họ tên</label><input type="text" id="edit-name"></div>
                <div class="form-group"><label>Số điện thoại</label><input type="text" id="edit-phone"></div>
                <div class="form-group"><label>Email</label><input type="text" id="edit-email"></div>
                <div class="form-group">
                    <label>Trạng thái</label>
                    <select id="edit-status">
                        <option value="PAID">PAID</option>
                        <option value="LEAD">LEAD</option>
                        <option value="CANCEL">CANCEL</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn-primary">Cập nhật</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allStudents = [];
        let filteredStudents = [];

        function checkLogin() {
            const pw = document.getElementById('admin-pass').value;
            if (pw === 'admin7day') {
                localStorage.setItem('admin_pw', pw);
                showDashboard();
            } else { alert('Sai mật khẩu!'); }
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            loadData();
            loadCMS();
        }

        async function loadData() {
            const pw = localStorage.getItem('admin_pw');
            const res = await fetch(`/api/admin?pw=${pw}`);
            const result = await res.json();
            if (result.success) {
                allStudents = result.data;
                applyFilters();
            }
        }

        function applyFilters() {
            const search = document.getElementById('search-box').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const dateRange = document.getElementById('filter-date').value;
            const now = new Date();

            filteredStudents = allStudents.filter(s => {
                const matchSearch = s.fullname.toLowerCase().includes(search) || s.phone.includes(search);
                const matchStatus = status === 'all' || s.status === status;
                
                // Lọc ngày cơ bản
                const sDate = parseDate(s.timestamp);
                let matchDate = true;
                if (dateRange === 'today') matchDate = sDate && sDate.toDateString() === now.toDateString();
                if (dateRange === 'week') matchDate = sDate && (now - sDate) < 7 * 24 * 3600 * 1000;
                if (dateRange === 'month') matchDate = sDate && sDate.getMonth() === now.getMonth();

                return matchSearch && matchStatus && matchDate;
            });
            renderTable();
        }

        function renderTable() {
            const list = document.getElementById('student-list');
            list.innerHTML = filteredStudents.map(s => `
                <tr>
                    <td>${s.timestamp}</td>
                    <td><b>${s.fullname}</b></td>
                    <td>${s.phone}</td>
                    <td>${s.email}</td>
                    <td><span class="status-badge status-${s.status.toLowerCase()}">${s.status}</span></td>
                    <td>
                        <button class="btn-icon edit" onclick='openEdit(${JSON.stringify(s)})'><i class="fas fa-edit"></i></button>
                        <button class="btn-icon delete" onclick="deleteStudent('${s.phone}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function parseDate(ts) {
            try { return new Date(ts.split(' ')[0].split('/').reverse().join('-')); } catch(e) { return null; }
        }

        function exportToCSV() {
            const headers = ["Thoi gian,Ho ten,SDT,Email,Trang thai"];
            const rows = filteredStudents.map(s => `"${s.timestamp}","${s.fullname}","${s.phone}","${s.email}","${s.status}"`);
            const csv = headers.concat(rows).join("\n");
            const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Hoc_Vien_7D_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        function openEdit(s) {
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('old-phone').value = s.phone;
            document.getElementById('edit-name').value = s.fullname;
            document.getElementById('edit-phone').value = s.phone;
            document.getElementById('edit-email').value = s.email;
            document.getElementById('edit-status').value = s.status;
        }

        document.getElementById('edit-form').onsubmit = async (e) => {
            e.preventDefault();
            const pw = localStorage.getItem('admin_pw');
            const data = {
                action: 'update-student',
                oldPhone: document.getElementById('old-phone').value,
                fullname: document.getElementById('edit-name').value,
                phone: document.getElementById('edit-phone').value,
                email: document.getElementById('edit-email').value,
                status: document.getElementById('edit-status').value,
                pw: pw
            };
            await fetch('/api/admin', { method: 'POST', body: JSON.stringify(data) });
            closeModal(); loadData();
        }

        async function deleteStudent(phone) {
            if (!confirm('Xóa vĩnh viễn học viên này?')) return;
            const pw = localStorage.getItem('admin_pw');
            await fetch('/api/admin', { 
                method: 'POST', 
                body: JSON.stringify({ action: 'delete-student', phone, pw }) 
            });
            loadData();
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
        
        async function loadCMS() {
            const res = await fetch('/api/config');
            const config = await res.json();
            document.getElementById('cms-fields').innerHTML = Object.keys(config).map(k => `
                <div class="cms-card card"><label>${k}</label><textarea id="cms-${k}">${config[k]}</textarea></div>
            `).join('');
        }

        async function saveCMS() {
            const pw = localStorage.getItem('admin_pw');
            const config = {};
            document.querySelectorAll('#cms-fields textarea').forEach(tx => {
                config[tx.id.replace('cms-', '')] = tx.value;
            });
            await fetch('/api/admin', { 
                method: 'POST', 
                body: JSON.stringify({ action: 'update-config', config, pw }) 
            });
            alert('Đã lưu CMS thành công!');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function logout() { localStorage.removeItem('admin_pw'); location.reload(); }
        if (localStorage.getItem('admin_pw')) showDashboard();
    </script>
</body>
</html>
