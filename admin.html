<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Admin | 7 Day Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #06403D;
            --accent: #FFD700;
            --bg: #050a09;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --muted: #a0a0a0;
            --success: #00ff88;
            --pending: #ffcc00;
            --danger: #ff4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 🛡️ Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-card {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card h2 { color: var(--accent); margin-bottom: 25px; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .login-card input {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
        }
        .login-card button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }
        .login-card .error { color: var(--danger); font-size: 14px; margin-top: 15px; display: none; }

        /* Dashboard Container */
        .dashboard-container {
            display: none; /* Hidden until auth */
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(20px);
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 50px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            color: var(--muted);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .nav-item i { font-size: 1.1rem; width: 20px; }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 215, 0, 0.1);
            color: var(--accent);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(6, 64, 61, 0.1), transparent);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 300px;
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
        }

        .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }

        /* Tables */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 18px 25px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 18px 25px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .tag-success { background: rgba(0, 255, 136, 0.1); color: var(--success); }
        .tag-pending { background: rgba(255, 204, 0, 0.1); color: var(--pending); }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: #222;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- 🛡️ Login Overlay -->
    <div id="login-overlay">
        <div class="login-card">
            <h2>Hệ thống Quản trị</h2>
            <p style="color:#666; font-size: 14px; margin-bottom: 20px;">Vui lòng nhập mã bảo mật để tiếp tục</p>
            <form id="login-form" onsubmit="handleLogin(event)">
                <input type="password" id="login-pw" placeholder="Mật khẩu" required autofocus>
                <button type="submit">Đăng nhập</button>
                <div id="login-error" class="error">Mật khẩu không chính xác!</div>
            </form>
        </div>
    </div>

    <div class="dashboard-container" id="dashboard" style="display: none;">
        <aside>
            <div class="brand">
                <i class="fas fa-circle-nodes"></i>
                CMS PRO
            </div>
            <div class="nav-item active" id="nav-products" onclick="switchTab('products')"><i class="fas fa-boxes-stacked"></i> Sản phẩm</div>
            <div class="nav-item" id="nav-customers" onclick="switchTab('customers')"><i class="fas fa-user-group"></i> Khách hàng</div>
            <div class="nav-item" id="nav-orders" onclick="switchTab('orders')"><i class="fas fa-cart-shopping"></i> Đơn hàng</div>
        </aside>

        <main>
            <header>
                <h1 id="tab-title">Quản lý Sản phẩm</h1>
                <div class="header-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Tìm kiếm..." oninput="handleSearch(this.value)" id="search-input">
                    </div>
                    <button class="btn btn-outline" onclick="exportData()"><i class="fas fa-file-export"></i> Xuất CSV</button>
                    <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Thêm mới</button>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Doanh thu</div>
                    <div class="stat-value" id="stat-revenue">0đ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Đơn hàng</div>
                    <div class="stat-value" id="stat-orders">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Khách hàng</div>
                    <div class="stat-value" id="stat-customers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Sắp hết hàng</div>
                    <div class="stat-value" id="stat-stock">0</div>
                </div>
            </div>

            <div class="card">
                <table id="data-table">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="crud-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Cập nhật</h2>
            <form id="crud-form" onsubmit="saveData(event)">
                <input type="hidden" name="id" id="item-id">
                <div id="form-fields"></div>
                <div style="display:flex; gap:12px; margin-top:30px">
                    <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex:1">Hủy</button>
                    <button type="submit" class="btn" style="flex:1">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'products';
        let searchQuery = '';
        let dbData = { products: [], customers: [], orders: [], stats: {} };

        function getAuthKey() { return sessionStorage.getItem('admin_pw'); }

        async function handleLogin(e) {
            e.preventDefault();
            const pw = document.getElementById('login-pw').value;
            sessionStorage.setItem('admin_pw', pw);
            const success = await loadData();
            if (!success) {
                document.getElementById('login-error').style.display = 'block';
                sessionStorage.removeItem('admin_pw');
            } else {
                document.getElementById('login-error').style.display = 'none';
            }
        }

        async function loadData() {
            const pw = getAuthKey();
            if (!pw) {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
                return false;
            }

            try {
                const res = await fetch(`/api/admin?pw=${encodeURIComponent(pw)}&action=get-stats`);
                const result = await res.json();
                if (result.success) {
                    dbData = result.data;
                    renderStats();
                    renderTable();
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    return true;
                } else {
                    return false;
                }
            } catch (e) { return false; }
        }

        function renderStats() {
            const s = dbData.stats;
            document.getElementById('stat-revenue').innerText = (s.totalRevenue || 0).toLocaleString() + 'đ';
            document.getElementById('stat-orders').innerText = s.totalOrders || 0;
            document.getElementById('stat-customers').innerText = s.totalCustomers || 0;
            document.getElementById('stat-stock').innerText = s.lowStockProducts || 0;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tab).classList.add('active');
            renderTable();
        }

        function handleSearch(val) { searchQuery = val.toLowerCase(); renderTable(); }

        function renderTable() {
            const thead = document.querySelector('#data-table thead');
            const tbody = document.querySelector('#data-table tbody');
            let data = dbData[currentTab] || [];
            
            if (searchQuery) {
                data = data.filter(i => JSON.stringify(i).toLowerCase().includes(searchQuery));
            }

            if (currentTab === 'products') {
                thead.innerHTML = '<tr><th>Sản phẩm</th><th>Giá</th><th>Kho</th><th>Thao tác</th></tr>';
                tbody.innerHTML = data.map(p => `<tr><td>${p.name}</td><td>${p.price.toLocaleString()}đ</td><td>${p.stock}</td><td><button class="btn btn-outline btn-sm" onclick="editItem('product', ${p.id})">Sửa</button></td></tr>`).join('');
            } else if (currentTab === 'customers') {
                thead.innerHTML = '<tr><th>Khách hàng</th><th>SĐT</th><th>Ngày đăng ký</th><th>Thao tác</th></tr>';
                tbody.innerHTML = data.map(c => `<tr><td>${c.fullname}</td><td>${c.phone}</td><td>${new Date(c.registration_date).toLocaleDateString()}</td><td><button class="btn btn-outline btn-sm" onclick="editItem('customer', ${c.id})">Sửa</button></td></tr>`).join('');
            } else if (currentTab === 'orders') {
                thead.innerHTML = '<tr><th>Đơn hàng</th><th>Sản phẩm</th><th>Thanh toán</th><th>Trạng thái</th><th>Thao tác</th></tr>';
                tbody.innerHTML = data.map(o => `<tr><td>#${o.id} - ${o.customer_name}</td><td>${o.product_name}</td><td>${o.amount.toLocaleString()}đ</td><td><span class="tag tag-${o.status}">${o.status}</span></td><td><button class="btn btn-outline btn-sm" onclick="editItem('order', ${o.id})">Sửa</button></td></tr>`).join('');
            }
        }

        function openModal(editData = null) {
            const fields = document.getElementById('form-fields');
            document.getElementById('item-id').value = editData ? editData.id : '';
            
            if (currentTab === 'products') {
                fields.innerHTML = `<div class="form-group"><label>Tên</label><input name="name" value="${editData?.name || ''}"></div><div class="form-group"><label>Giá</label><input type="number" name="price" value="${editData?.price || ''}"></div><div class="form-group"><label>Mã Prefix</label><input name="code_prefix" value="${editData?.code_prefix || '7NGAY'}"></div><div class="form-group"><label>Kho</label><input type="number" name="stock" value="${editData?.stock || 999}"></div>`;
            } else if (currentTab === 'customers') {
                fields.innerHTML = `<div class="form-group"><label>Họ tên</label><input name="fullname" value="${editData?.fullname || ''}"></div><div class="form-group"><label>SĐT</label><input name="phone" value="${editData?.phone || ''}"></div><div class="form-group"><label>Email</label><input type="email" name="email" value="${editData?.email || ''}"></div>`;
            } else if (currentTab === 'orders') {
                fields.innerHTML = `<div class="form-group"><label>Số tiền</label><input type="number" name="amount" value="${editData?.amount || ''}"></div><div class="form-group"><label>Trạng thái</label><select name="status"><option value="pending" ${editData?.status === 'pending' ? 'selected' : ''}>Pending</option><option value="success" ${editData?.status === 'success' ? 'selected' : ''}>Success</option></select></div>`;
            }
            document.getElementById('crud-modal').style.display = 'flex';
        }

        function editItem(type, id) {
            const item = dbData[type + 's'].find(x => x.id == id);
            if (item) openModal(item);
        }

        async function saveData(e) {
            e.preventDefault();
            const pw = getAuthKey();
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());
            const id = payload.id;
            
            const res = await fetch(`/api/admin?pw=${encodeURIComponent(pw)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: id ? 'update' : 'create', type: currentTab.replace(/s$/, ''), payload })
            });
            if ((await res.json()).success) { closeModal(); loadData(); }
        }

        function closeModal() { document.getElementById('crud-modal').style.display = 'none'; }

        function exportData() {
            let data = dbData[currentTab] || [];
            if (data.length === 0) return alert('Không có dữ liệu');
            const mapping = {
                products: { name: 'Sản phẩm', price: 'Giá', stock: 'Kho' },
                customers: { fullname: 'Họ tên', phone: 'SĐT', email: 'Email', registration_date: 'Ngày' },
                orders: { id: 'Mã', customer_name: 'Khách', product_name: 'Sản phẩm', amount: 'Tiền', status: 'Trạng thái' }
            };
            const map = mapping[currentTab];
            const keys = Object.keys(map);
            const rows = [keys.map(k => map[k]).join(',')];
            data.forEach(d => {
                rows.push(keys.map(k => `"${(d[k] || '').toString().replace(/"/g, '""')}"`).join(','));
            });
            const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${currentTab}_export.csv`;
            link.click();
        }

        loadData();
    </script>
</body>
</html>
