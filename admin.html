<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | 7 Ngày Lên Tay Phó Nháy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        .status-day { background: rgba(0, 255, 128, 0.1); color: #00ff80; border: 1px solid rgba(0, 255, 128, 0.2); }
    </style>
</head>
<body class="admin-body">

    <!-- Login Overlay -->
    <div id="login-overlay" class="admin-login-overlay">
        <div class="login-card">
            <h2 style="margin-bottom: 20px;">🔒 Admin Access</h2>
            <input type="password" id="admin-pw" placeholder="Nhập mật khẩu..." style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; margin-bottom: 20px;">
            <button onclick="checkPassword()" class="cta-button" style="width: 100%;">Truy cập ngay</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-content" class="hidden">
        <header class="dashboard-header">
            <div>
                <h1 style="font-size: 1.8rem; color: #fff;">DASHBOARD</h1>
                <p style="color: #aaa; font-size: 0.9rem;">Chào mừng quay trở lại, Tấn!</p>
            </div>
            <button onclick="fetchLeads()" class="refresh-btn">
                Làm mới dữ liệu
            </button>
        </header>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Tổng số Lead</div>
                <div id="total-leads" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Đã thanh toán (PAID)</div>
                <div id="total-paid" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Doanh thu</div>
                <div id="total-revenue" class="stat-value">0đ</div>
            </div>
        </div>

        <div class="table-container">
            <h3 style="margin-bottom: 20px; color: #fff;">Danh sách học viên & Tiến độ</h3>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Khách hàng</th>
                        <th>SĐT</th>
                        <th>Email</th>
                        <th>Trạng thái & Tiến độ</th>
                    </tr>
                </thead>
                <tbody id="lead-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let adminPw = localStorage.getItem('admin_pw');
        if (adminPw) login(adminPw);

        async function checkPassword() {
            const pw = document.getElementById('admin-pw').value;
            login(pw);
        }

        async function login(pw) {
            try {
                const response = await fetch(`/api/admin?pw=${pw}`);
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('admin_pw', pw);
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('dashboard-content').classList.remove('hidden');
                    renderDashboard(result.data);
                } else {
                    alert("Sai mật khẩu!");
                }
            } catch (e) { alert("Lỗi: " + e.message); }
        }

        async function fetchLeads() {
            const pw = localStorage.getItem('admin_pw');
            const response = await fetch(`/api/admin?pw=${pw}`);
            const result = await response.json();
            if (result.success) renderDashboard(result.data);
        }

        function renderDashboard(leads) {
            leads.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            const paidLeads = leads.filter(l => l.status === 'PAID' || (l.status && l.status.startsWith('DAY_'))).length;
            
            document.getElementById('total-leads').innerText = leads.length;
            document.getElementById('total-paid').innerText = paidLeads;
            document.getElementById('total-revenue').innerText = (paidLeads * 199000).toLocaleString() + 'đ';

            const tbody = document.getElementById('lead-table-body');
            tbody.innerHTML = leads.map(lead => {
                const status = (lead.status || 'PENDING').toUpperCase();
                let statusText = '⏳ Chờ TV';
                let statusClass = 'status-pending';

                if (status === 'PAID') {
                    statusText = '✅ Đã thanh toán';
                    statusClass = 'status-paid';
                } else if (status.startsWith('DAY_')) {
                    const day = status.split('_')[1];
                    statusText = `📖 Đang học (Ngày ${day})`;
                    statusClass = 'status-day';
                } else if (status === 'CANCELLED') {
                    statusText = '❌ Đã hủy';
                    statusClass = 'status-cancelled';
                } else if (status === 'REMINDED') {
                    statusText = '🔔 Đã nhắc';
                    statusClass = 'status-reminded';
                }

                return `
                    <tr>
                        <td>${new Date(lead.timestamp).toLocaleString('vi-VN')}</td>
                        <td style="font-weight:700;">${lead.fullname}</td>
                        <td>${lead.phone}</td>
                        <td>${lead.email}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
