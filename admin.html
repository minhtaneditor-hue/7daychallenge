<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Admin | 7 Day Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #06403D;
            --accent: #FFD700;
            --bg: #050a09;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --muted: #a0a0a0;
            --success: #00ff88;
            --pending: #ffcc00;
            --danger: #ff4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(20px);
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 50px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            color: var(--muted);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .nav-item i { font-size: 1.1rem; }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 215, 0, 0.1);
            color: var(--accent);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(6, 64, 61, 0.1), transparent);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .stat-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: 700; color: #fff; }
        .stat-trend { font-size: 12px; margin-top: 8px; color: var(--success); }

        /* Tables & Content */
        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-success { background: var(--success); color: #000; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 18px 25px; font-size: 12px; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 18px 25px; border-bottom: 1px solid var(--border); font-size: 14px; color: #eee; }
        tr:hover td { background: rgba(255, 255, 255, 0.01); }

        .tag { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tag-success { background: rgba(0, 255, 136, 0.1); color: var(--success); }
        .tag-pending { background: rgba(255, 204, 0, 0.1); color: var(--pending); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0a0a0a;
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; background: rgba(255,255,255,0.05); }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .search-box input {
            padding-left: 45px;
            background: rgba(255,255,255,0.03);
            border-radius: 50px;
            border-color: var(--border);
            height: 44px;
        }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--accent)"><circle cx="12" cy="12" r="10"/></svg>
            CMS PRO
        </div>
        <div class="nav-item active" onclick="switchTab('products')"><i class="fas fa-boxes-stacked"></i> Sản phẩm</div>
        <div class="nav-item" onclick="switchTab('customers')"><i class="fas fa-user-group"></i> Khách hàng</div>
        <div class="nav-item" onclick="switchTab('orders')"><i class="fas fa-cart-shopping"></i> Đơn hàng</div>
    </aside>

    <main>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Tổng doanh thu</div>
                <div class="stat-value" id="stat-revenue">0đ</div>
                <div class="stat-trend"><i class="fas fa-arrow-up"></i> +12% vs last month</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tổng đơn hàng</div>
                <div class="stat-value" id="stat-orders">0</div>
                <div class="stat-trend" style="color: var(--pending)">Chờ xác nhận: <span id="stat-pending">0</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Khách hàng</div>
                <div class="stat-value" id="stat-customers">0</div>
                <div class="stat-trend">+5 tuần này</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Sản phẩm sắp hết</div>
                <div class="stat-value" id="stat-stock">0</div>
                <div class="stat-trend" style="color: var(--danger)">Cần nhập thêm</div>
            </div>
        </div>

        <header>
            <h1 id="tab-title" style="min-width: 250px;">Sản phẩm</h1>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Tìm kiếm..." oninput="handleSearch(this.value)">
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-outline" onclick="exportData()"><i class="fas fa-file-export"></i> Xuất CSV</button>
                <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Thêm mới</button>
            </div>
        </header>

        <div class="card">
            <table id="data-table">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <div id="crud-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Thêm mới</h2>
            <form id="crud-form" onsubmit="saveData(event)">
                <input type="hidden" id="item-id">
                <div id="form-fields"></div>
                <div style="display: flex; gap: 12px; margin-top: 40px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex:1">Hủy</button>
                    <button type="submit" class="btn" style="flex:1">Lưu dữ liệu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'products';
        let searchQuery = '';
        let dbData = { products: [], customers: [], orders: [], stats: {} };

        async function loadData() {
            try {
                const res = await fetch('/api/admin?pw=admin7day&action=get-stats');
                const result = await res.json();
                if (result.success) {
                    dbData = result.data;
                    renderStats();
                    renderTable();
                }
            } catch (e) { console.error('Load error:', e); }
        }

        function renderStats() {
            const s = dbData.stats;
            document.getElementById('stat-revenue').innerText = (s.totalRevenue || 0).toLocaleString() + 'đ';
            document.getElementById('stat-orders').innerText = s.totalOrders || 0;
            document.getElementById('stat-pending').innerText = s.pendingOrders || 0;
            document.getElementById('stat-customers').innerText = s.totalCustomers || 0;
            document.getElementById('stat-stock').innerText = s.lowStockProducts || 0;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (event) event.currentTarget.classList.add('active');
            const titles = { products: 'Quản lý Sản phẩm', customers: 'Danh sách Khách hàng', orders: 'Quản lý Đơn hàng' };
            document.getElementById('tab-title').innerText = titles[tab];
            
            // Clear search when switching tabs
            searchQuery = '';
            document.getElementById('search-input').value = '';
            
            renderTable();
        }

        function handleSearch(val) {
            searchQuery = val.toLowerCase().trim();
            renderTable();
        }

        function renderTable() {
            const thead = document.querySelector('#data-table thead');
            const tbody = document.querySelector('#data-table tbody');
            
            let data = dbData[currentTab] || [];
            
            // Apply Search Filtering
            if (searchQuery) {
                data = data.filter(item => {
                    if (currentTab === 'products') {
                        return item.name.toLowerCase().includes(searchQuery) || String(item.id).includes(searchQuery);
                    } else if (currentTab === 'customers') {
                        return item.fullname.toLowerCase().includes(searchQuery) || 
                               item.phone.includes(searchQuery) || 
                               (item.email && item.email.toLowerCase().includes(searchQuery)) ||
                               (item.zalo && item.zalo.toLowerCase().includes(searchQuery));
                    } else if (currentTab === 'orders') {
                        return String(item.id).includes(searchQuery) || 
                               item.customer_name.toLowerCase().includes(searchQuery) ||
                               item.product_name.toLowerCase().includes(searchQuery) ||
                               item.status.toLowerCase().includes(searchQuery);
                    }
                    return false;
                });
            }

            if (currentTab === 'products') {
                thead.innerHTML = '<tr><th>Sản phẩm</th><th>Giá bán</th><th>Tồn kho</th><th style="text-align:right">Thao tác</th></tr>';
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td><div style="font-weight:600">${p.name}</div><div style="font-size:12px;color:var(--muted)">ID: #${p.id}</div></td>
                        <td>${p.price.toLocaleString()}đ</td>
                        <td><span style="color:${p.stock < 10 ? 'var(--danger)' : 'inherit'}">${p.stock}</span></td>
                        <td style="text-align:right">
                            <button class="btn-outline btn-sm" onclick="editItem('product', ${p.id})"><i class="fas fa-pen"></i></button>
                            <button class="btn-outline btn-sm" style="color:var(--danger)" onclick="deleteItem('product', ${p.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
            } else if (currentTab === 'customers') {
                thead.innerHTML = '<tr><th>Khách hàng</th><th>Liên hệ</th><th>Ngày đăng ký</th><th style="text-align:right">Thao tác</th></tr>';
                tbody.innerHTML = data.map(c => `
                    <tr>
                        <td><div style="font-weight:600">${c.fullname}</div><div style="font-size:12px;color:var(--muted)">ID: #${c.id}</div></td>
                        <td><div>${c.phone}</div><div style="font-size:12px;color:var(--muted)">${c.email || ''}</div></td>
                        <td>${new Date(c.registration_date).toLocaleDateString()}</td>
                        <td style="text-align:right">
                            <button class="btn-outline btn-sm" onclick="editItem('customer', ${c.id})"><i class="fas fa-pen"></i></button>
                            <button class="btn-outline btn-sm" style="color:var(--danger)" onclick="deleteItem('customer', ${c.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
            } else if (currentTab === 'orders') {
                thead.innerHTML = '<tr><th>Đơn hàng</th><th>Chi tiết</th><th>Số tiền</th><th>Trạng thái</th><th style="text-align:right">Thao tác</th></tr>';
                tbody.innerHTML = data.map(o => `
                    <tr>
                        <td><div style="font-weight:600">Order #${o.id}</div><div style="font-size:12px;color:var(--muted)">Khách: ${o.customer_name}</div></td>
                        <td>${o.product_name}</td>
                        <td style="font-weight:700;color:var(--accent)">${o.amount.toLocaleString()}đ</td>
                        <td><span class="tag tag-${o.status}">${o.status}</span></td>
                        <td style="text-align:right; display:flex; gap:8px; justify-content:flex-end">
                            ${o.status === 'pending' ? `<button class="btn-success btn-sm" onclick="confirmPayment(${o.id})"><i class="fas fa-check"></i> Xác nhận TT</button>` : ''}
                            <button class="btn-outline btn-sm" onclick="editItem('order', ${o.id})"><i class="fas fa-pen"></i></button>
                            <button class="btn-outline btn-sm" style="color:var(--danger)" onclick="deleteItem('order', ${o.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
            }
        }

        async function confirmPayment(id) {
            if (!confirm('Xác nhận khách đã chuyển tiền cho đơn hàng này?')) return;
            const res = await fetch('/api/admin?pw=admin7day', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'update', type: 'order', payload: { id, status: 'success' } })
            });
            if ((await res.json()).success) loadData();
        }

        function openModal(editData = null) {
            const fields = document.getElementById('form-fields');
            const title = document.getElementById('modal-title');
            const itemId = document.getElementById('item-id');
            
            itemId.value = editData ? editData.id : '';
            title.innerText = editData 
                ? 'Cập nhật ' + (editData.name || editData.fullname || currentTab)
                : 'Thêm ' + currentTab;
            
            if (currentTab === 'products') {
                fields.innerHTML = `
                    <div class="form-group"><label>Tên sản phẩm</label><input name="name" required value="${editData?.name || ''}"></div>
                    <div class="form-group"><label>Giá bán</label><input type="number" name="price" required value="${editData?.price || ''}"></div>
                    <div class="form-group"><label>Mô tả</label><textarea name="description" rows="3">${editData?.description || ''}</textarea></div>
                    <div class="form-group"><label>Tồn kho</label><input type="number" name="stock" value="${editData?.stock || 999}"></div>
                `;
            } else if (currentTab === 'customers') {
                fields.innerHTML = `
                    <div class="form-group"><label>Họ tên</label><input name="fullname" required value="${editData?.fullname || ''}"></div>
                    <div class="form-group"><label>SĐT</label><input name="phone" required value="${editData?.phone || ''}"></div>
                    <div class="form-group"><label>Email</label><input type="email" name="email" value="${editData?.email || ''}"></div>
                    <div class="form-group"><label>Zalo</label><input name="zalo" value="${editData?.zalo || ''}"></div>
                `;
            } else if (currentTab === 'orders') {
                fields.innerHTML = `
                    <div class="form-group"><label>Khách hàng</label>
                        <select name="customer_id" required>
                            ${dbData.customers.map(c => `<option value="${c.id}" ${editData?.customer_id == c.id ? 'selected' : ''}>${c.fullname}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group"><label>Sản phẩm</label>
                        <select name="product_id" required>
                            ${dbData.products.map(p => `<option value="${p.id}" ${editData?.product_id == p.id ? 'selected' : ''}>${p.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group"><label>Số tiền</label><input type="number" name="amount" required value="${editData?.amount || ''}"></div>
                    <div class="form-group"><label>Trạng thái</label>
                        <select name="status">
                            <option value="pending" ${editData?.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="success" ${editData?.status === 'success' ? 'selected' : ''}>Success</option>
                        </select>
                    </div>
                `;
            }
            document.getElementById('crud-modal').style.display = 'flex';
        }

        function editItem(type, id) {
            const data = dbData[type + 's'].find(x => x.id == id);
            if (data) openModal(data);
        }

        async function saveData(e) {
            e.preventDefault();
            const id = document.getElementById('item-id').value;
            const payload = Object.fromEntries(new FormData(e.target).entries());
            if (id) payload.id = id;
            const res = await fetch('/api/admin?pw=admin7day', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: id ? 'update' : 'create', type: currentTab.replace(/s$/, ''), payload })
            });
            if ((await res.json()).success) { closeModal(); loadData(); }
        }

        async function deleteItem(type, id) {
            if (!confirm('Xóa dữ liệu này?')) return;
            const res = await fetch('/api/admin?pw=admin7day', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'delete', type, payload: { id } })
            });
            if ((await res.json()).success) loadData();
        }

        function closeModal() { document.getElementById('crud-modal').style.display = 'none'; }

        function exportData() {
            let data = dbData[currentTab] || [];
            
            // Apply Search Filtering for export too
            if (searchQuery) {
                data = data.filter(item => {
                    if (currentTab === 'products') {
                        return item.name.toLowerCase().includes(searchQuery) || String(item.id).includes(searchQuery);
                    } else if (currentTab === 'customers') {
                        return item.fullname.toLowerCase().includes(searchQuery) || item.phone.includes(searchQuery) || (item.email && item.email.toLowerCase().includes(searchQuery));
                    } else if (currentTab === 'orders') {
                        return String(item.id).includes(searchQuery) || item.customer_name.toLowerCase().includes(searchQuery) || item.product_name.toLowerCase().includes(searchQuery);
                    }
                    return false;
                });
            }

            if (data.length === 0) return alert('Không có dữ liệu để xuất');

            const headers = Object.keys(data[0]);
            const csvRows = [];
            csvRows.push(headers.join(','));

            for (const row of data) {
                const values = headers.map(header => {
                    const val = row[header];
                    const escaped = ('' + (val || '')).replace(/"/g, '""');
                    return `"${escaped}"`;
                });
                csvRows.push(values.join(','));
            }

            const csvString = '\ufeff' + csvRows.join('\n'); // Add BOM for Excel UTF-8 support
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `${currentTab}_export_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        loadData();
    </script>
</body>
</html>
