<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CRM | Minh Tấn Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        :root {
            --primary: #06403D;
            --accent: #FFD700;
            --dark-bg: #0a1110;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* LOGIN SCREEN PREMIUM */
        #login-screen {
            background: radial-gradient(circle at top right, #0d2a28, #0a1110);
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 50px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-card i { font-size: 50px; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .login-input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: white; text-align: center; font-size: 18px; margin: 25px 0;
        }

        /* LAYOUT */
        .admin-layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px; background: rgba(0, 0, 0, 0.3); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 15px; font-size: 22px; font-weight: 700;
            letter-spacing: 1px; color: var(--accent); margin-bottom: 50px; padding-left: 10px;
        }
        .nav-menu { flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px;
            color: var(--text-muted); text-decoration: none; border-radius: 15px;
            transition: 0.3s; margin-bottom: 8px; font-weight: 500;
        }
        .nav-item.active, .nav-item:hover {
            background: rgba(6, 64, 61, 0.6); color: var(--accent);
        }

        .main-hero { flex: 1; padding: 40px 60px; background: radial-gradient(circle at 10% 20%, #0d1a19 0%, #0a1110 90%); }

        /* KPI CARDS */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 25px;
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 70%);
        }
        .stat-val { font-size: 36px; font-weight: 700; display: block; margin-top: 10px; color: white; }
        .stat-label { color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }

        /* FILTERS BAR */
        .control-bar {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 20px; display: flex; gap: 20px; margin-bottom: 30px; align-items: center;
        }
        .search-box { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        .filter-select { background: transparent; border: none; color: var(--accent); font-weight: 600; cursor: pointer; outline: none; }

        /* DATA TABLE */
        .data-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 25px; overflow: hidden; padding: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 20px; border-top: 1px solid var(--border); }
        tr:hover { background: rgba(255, 255, 255, 0.01); }

        .status-pill { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
        .pill-paid { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .pill-lead { background: rgba(241, 196, 15, 0.15); color: #f1c40f; }

        .action-btn { 
            background: rgba(255,255,255,0.05); color: white; border: none; width: 35px; height: 35px; 
            border-radius: 10px; cursor: pointer; transition: 0.3s; margin-left: 5px;
        }
        .action-btn:hover { background: var(--accent); color: black; transform: translateY(-3px); }

        /* MODAL GLASSMORPISM */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-box { 
            background: #111; border: 1px solid var(--border); padding: 40px; border-radius: 30px; 
            width: 100%; max-width: 500px; box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }
        .modal-box h3 { margin: 0 0 30px 0; font-size: 24px; color: var(--accent); }
        .modal-input { 
            width: 100%; background: #1a1a1a; border: 1px solid var(--border); padding: 15px; 
            border-radius: 12px; color: white; margin-bottom: 20px; box-sizing: border-box;
        }

        .btn-gold { background: var(--accent); color: black; font-weight: 700; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
    </style>
</head>
<body class="dark-theme">

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-card" data-aos="zoom-in">
            <i class="fas fa-fingerprint"></i>
            <h1 style="font-size: 28px; margin: 0;">Access Admin</h1>
            <p style="color: var(--text-muted);">Hệ thống Hub CRM - Minh Tấn Academy</p>
            <input type="password" id="admin-pass" class="login-input" placeholder="••••••••">
            <button class="btn-gold" onclick="checkLogin()" style="width: 100%;">Truy cập hệ thống</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="admin-dashboard" style="display: none;">
        <div class="admin-layout">
            <aside class="sidebar">
                <div class="sidebar-logo">
                    <i class="fas fa-crown"></i>
                    <span>TẤN ACADEMY</span>
                </div>
                <nav class="nav-menu">
                    <a href="#" class="nav-item active" onclick="switchTab('leads')">
                        <i class="fas fa-chart-pie"></i> Dashboard Học Viên
                    </a>
                    <a href="#" class="nav-item" onclick="switchTab('cms')">
                        <i class="fas fa-sliders-h"></i> Tinh chỉnh Website
                    </a>
                    <a href="#" class="nav-item" onclick="logout()" style="margin-top: 50px;">
                        <i class="fas fa-power-off"></i> Thoát hệ thống
                    </a>
                </nav>
            </aside>

            <main class="main-hero">
                <!-- LEADS TAB -->
                <section id="tab-leads" class="tab-content active">
                    <div class="stats-row" data-aos="fade-up">
                        <div class="stat-card">
                            <span class="stat-label">Tổng quy mô</span>
                            <span class="stat-val" id="stat-total">0</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Học viên chính thức</span>
                            <span class="stat-val" style="color: var(--accent);" id="stat-paid">0</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Doanh thu dự kiến</span>
                            <span class="stat-val" id="stat-revenue">0đ</span>
                        </div>
                    </div>

                    <div class="control-bar card" data-aos="fade-up" data-aos-delay="100">
                        <i class="fas fa-search" style="color: var(--text-muted);"></i>
                        <input type="text" id="main-search" class="search-box" placeholder="Tìm tên, email hoặc số điện thoại..." oninput="refreshUI()">
                        
                        <div style="height: 20px; width: 1px; background: var(--border);"></div>
                        
                        <select id="filter-status" class="filter-select" onchange="refreshUI()">
                            <option value="all">Tất cả trạng thái</option>
                            <option value="PAID">Đã thanh toán</option>
                            <option value="LEAD">Đang chờ xử lý</option>
                        </select>

                        <button class="btn-gold" style="padding: 10px 20px; font-size: 13px;" onclick="exportCSV()">
                            <i class="fas fa-file-excel"></i> XUẤT DATA
                        </button>
                    </div>

                    <div class="data-card animate-up" data-aos="fade-up" data-aos-delay="200">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 50px;">STT</th>
                                    <th>Ghi danh lúc</th>
                                    <th>Thông tin học viên</th>
                                    <th>Email</th>
                                    <th>Tiến độ</th>
                                    <th style="text-align: right;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="student-list"></tbody>
                        </table>
                    </div>
                </section>

                <!-- CMS TAB -->
                <section id="tab-cms" class="tab-content" style="display: none;">
                    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                        <h1 style="font-size: 32px; margin: 0;">Cấu hình CMS</h1>
                        <button class="btn-gold" onclick="saveCMS()"><i class="fas fa-save"></i> CẬP NHẬT WEBSITE</button>
                    </header>
                    <div id="cms-editor" class="stats-row" style="grid-template-columns: repeat(2, 1fr);">
                        <!-- CMS Fields -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- MODAL EDIT -->
    <div id="edit-modal" class="modal">
        <div class="modal-box" data-aos="zoom-in">
            <h3>Hiệu chỉnh thông tin</h3>
            <form id="edit-form">
                <input type="hidden" id="old-phone">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label style="font-size: 12px; color: var(--text-muted);">HỌ VÀ TÊN</label>
                        <input type="text" id="edit-name" class="modal-input">
                    </div>
                    <div>
                        <label style="font-size: 12px; color: var(--text-muted);">SỐ ĐIỆN THOẠI</label>
                        <input type="text" id="edit-phone" class="modal-input">
                    </div>
                </div>
                <label style="font-size: 12px; color: var(--text-muted);">ĐỊA CHỈ EMAIL</label>
                <input type="text" id="edit-email" class="modal-input">
                
                <label style="font-size: 12px; color: var(--text-muted);">TRẠNG THÁI HỆ THỐNG</label>
                <select id="edit-status" class="modal-input">
                    <option value="PAID">PAID (Chính thức)</option>
                    <option value="LEAD">LEAD (Chờ xử lý)</option>
                    <option value="CANCEL">CANCEL (Đã hủy)</option>
                </select>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn-gold" style="background: rgba(255,255,255,0.05); color: white;" onclick="closeModal()">HỦY BỎ</button>
                    <button type="submit" class="btn-gold" style="flex: 1;">LƯU THAY ĐỔI</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        let masterData = [];
        let filteredStudents = [];

        function checkLogin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'admin7day') {
                localStorage.setItem('admin_pw', pass);
                initDashboard();
            } else { alert('Mật khẩu không chính xác!'); }
        }

        async function initDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            await loadData();
            await loadCMS();
        }

        async function loadData() {
            const pw = localStorage.getItem('admin_pw');
            try {
                const res = await fetch(`/api/admin?pw=${pw}`);
                const result = await res.json();
                if (result.success) {
                    masterData = result.data;
                    refreshUI();
                } else { logout(); }
            } catch (e) { console.error(e); }
        }

        function refreshUI() {
            const search = document.getElementById('main-search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            
            filteredStudents = masterData.filter(s => {
                const matchSearch = String(s.fullname).toLowerCase().includes(search) || 
                                    String(s.phone).includes(search) || 
                                    String(s.email).toLowerCase().includes(search);
                const matchStatus = status === 'all' || s.status === status;
                return matchSearch && matchStatus;
            });

            renderTable(filteredStudents);
            renderStats(filteredStudents);
        }

        function renderStats(data) {
            const paid = data.filter(s => s.status === 'PAID').length;
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-paid').innerText = paid;
            document.getElementById('stat-revenue').innerText = (paid * 199000).toLocaleString() + 'đ';
        }

        function renderTable(data) {
            const list = document.getElementById('student-list');
            list.innerHTML = data.map((s, index) => `
                <tr>
                    <td style="color: var(--text-muted); font-weight: 600;">${index + 1}</td>
                    <td><span style="font-size: 13px; color: var(--text-muted);">${s.timestamp}</span></td>
                    <td>
                        <div style="font-weight: 700; font-size: 16px;">${s.fullname}</div>
                        <div style="font-size: 12px; color: var(--text-muted);">${s.phone}</div>
                    </td>
                    <td><span style="color: #bbb; border-bottom: 1px dashed #444;">${s.email}</span></td>
                    <td><span class="status-pill pill-${s.status.toLowerCase()}">${s.status}</span></td>
                    <td style="text-align: right;">
                        <button class="action-btn" onclick="openEdit(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" onclick="deleteStudent(${index})" style="color: #ff4d4d;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function openEdit(index) {
            const s = filteredStudents[index];
            if (!s) return;
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('old-phone').value = s.phone;
            document.getElementById('edit-name').value = s.fullname;
            document.getElementById('edit-phone').value = s.phone;
            document.getElementById('edit-email').value = s.email;
            document.getElementById('edit-status').value = s.status;
        }

        async function deleteStudent(index) {
            const s = filteredStudents[index];
            if (!s) return;
            if (!confirm(`Hành động xóa vĩnh viễn học viên ${s.fullname} không thể khôi phục. Tiếp tục?`)) return;
            const pw = localStorage.getItem('admin_pw');
            
            try {
                const res = await fetch('/api/admin', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete-student', phone: s.phone, pw }) 
                });
                const result = await res.json();
                if (result.success) {
                    alert('Hệ thống đã xóa học viên thành công!');
                    loadData();
                }
            } catch (err) { alert('Lỗi kết nối máy chủ!'); }
        }

        document.getElementById('edit-form').onsubmit = async (e) => {
            e.preventDefault();
            const pw = localStorage.getItem('admin_pw');
            const data = {
                action: 'update-student',
                oldPhone: document.getElementById('old-phone').value,
                fullname: document.getElementById('edit-name').value,
                phone: document.getElementById('edit-phone').value,
                email: document.getElementById('edit-email').value,
                status: document.getElementById('edit-status').value,
                pw
            };
            
            try {
                const res = await fetch('/api/admin', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data) 
                });
                const result = await res.json();
                if (result.success) {
                    alert('Đã cập nhật dữ liệu thành công!');
                    closeModal();
                    loadData();
                }
            } catch (err) { alert('Lỗi cập nhật!'); }
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
        
        async function loadCMS() {
            const res = await fetch('/api/config');
            const config = await res.json();
            document.getElementById('cms-editor').innerHTML = Object.keys(config).map(k => `
                <div class="stat-card" style="padding: 20px;">
                    <label style="font-size: 11px; color: var(--accent); letter-spacing: 1px;">KEY: ${k}</label>
                    <textarea id="cms-${k}" style="width: 100%; height: 80px; background: transparent; border: none; color: white; margin-top: 10px; font-family: inherit; font-size: 14px; outline: none;">${config[k]}</textarea>
                </div>
            `).join('');
        }

        async function saveCMS() {
            const config = {};
            document.querySelectorAll('#cms-editor textarea').forEach(ta => config[ta.id.replace('cms-', '')] = ta.value);
            const pw = localStorage.getItem('admin_pw');
            const res = await fetch('/api/admin', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'update-config', config, pw }) 
            });
            if ((await res.json()).success) alert('Đã tối ưu hóa nội dung website!');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${t}`).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function exportCSV() {
            const headers = ["Ghi danh,Hoc vien,Phone,Email,Trang thai"];
            const rows = filteredStudents.map(s => `"${s.timestamp}","${s.fullname}","${s.phone}","${s.email}","${s.status}"`);
            const blob = new Blob(["\ufeff" + headers.concat(rows).join("\n")], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Tấn_Academy_Data_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        function logout() { localStorage.removeItem('admin_pw'); location.reload(); }
        if (localStorage.getItem('admin_pw')) initDashboard();
    </script>
</body>
</html>
