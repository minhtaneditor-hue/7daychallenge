<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CRM | Minh Tấn Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06403D; --accent: #FFD700; --dark-bg: #0a1110;
            --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0; --text-muted: #888;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--dark-bg); color: var(--text-main); margin: 0; }
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #0d2a28, #0a1110); }
        .login-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 50px; border-radius: 30px; text-align: center; width: 350px; }
        .login-input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; border-radius: 12px; margin: 20px 0; text-align: center; }
        .btn-gold { background: var(--accent); color: black; font-weight: 700; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; transition: 0.3s; width: 100%; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--border); padding: 40px 20px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px; color: var(--text-muted); text-decoration: none; border-radius: 12px; margin-bottom: 5px; }
        .nav-item.active { background: rgba(6,64,61,0.5); color: var(--accent); }
        .main-hero { flex: 1; padding: 40px 50px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 20px; }
        .data-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid var(--border); }
        .status-pill { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .pill-paid { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .pill-lead { background: rgba(241,196,15,0.2); color: #f1c40f; }
        .action-btn { background: rgba(255,255,255,0.05); color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 100; }
        .modal-box { background: #111; padding: 30px; border-radius: 20px; width: 400px; border: 1px solid var(--border); }
        .modal-input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        textarea { width: 100%; height: 80px; background: transparent; border: 1px solid var(--border); color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--accent);"></i>
            <h2>Admin Login</h2>
            <input type="password" id="admin-pass" class="login-input" placeholder="Mật khẩu">
            <button class="btn-gold" onclick="checkLogin()">Vào Dashboard</button>
        </div>
    </div>

    <div id="admin-dashboard" style="display: none;">
        <div class="admin-layout">
            <aside class="sidebar">
                <div style="color: var(--accent); font-weight: 700; font-size: 20px; margin-bottom: 40px;">TẤN ACADEMY</div>
                <nav>
                    <a href="#" class="nav-item active" id="btn-leads" onclick="switchTab('leads')"><i class="fas fa-users"></i> Học Viên</a>
                    <a href="#" class="nav-item" id="btn-cms" onclick="switchTab('cms')"><i class="fas fa-globe"></i> Website CMS</a>
                    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Thoát</a>
                </nav>
            </aside>
            <main class="main-hero">
                <section id="tab-leads">
                    <div class="stats-row">
                        <div class="stat-card">Tổng học viên <div id="stat-total" style="font-size: 30px; font-weight: 700;">0</div></div>
                        <div class="stat-card">Đã thanh toán <div id="stat-paid" style="font-size: 30px; font-weight: 700; color: #2ecc71;">0</div></div>
                        <div class="stat-card">Tổng doanh thu <div id="stat-rev" style="font-size: 30px; font-weight: 700; color: var(--accent);">0đ</div></div>
                    </div>
                    <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                        <input type="text" id="search" placeholder="Tìm tên/sđt..." oninput="refreshUI()" style="flex: 1; padding: 12px; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--border); color: white;">
                        <button class="btn-gold" style="width: auto; padding: 0 20px;" onclick="exportCSV()">XUẤT DATA</button>
                        <button class="btn-gold" style="width: auto; padding: 0 20px; background:#444; color:white;" onclick="loadData()">LÀM MỚI</button>
                    </div>
                    <div class="data-card">
                        <table>
                            <thead><tr><th>STT</th><th>Thời gian</th><th>Học viên</th><th>Tiến độ</th><th>Thao tác</th></tr></thead>
                            <tbody id="list"></tbody>
                        </table>
                    </div>
                </section>
                <section id="tab-cms" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h1>Cấu hình Website</h1>
                        <button class="btn-gold" onclick="saveCMS()" style="width: auto;">LƯU CMS</button>
                    </div>
                    <div id="cms-fields" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;"></div>
                </section>
            </main>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-box">
            <h3>Sửa thông tin</h3>
            <input type="hidden" id="old-phone">
            <input type="text" id="edit-name" class="modal-input" placeholder="Họ tên">
            <input type="text" id="edit-phone" class="modal-input" placeholder="Số điện thoại">
            <input type="text" id="edit-email" class="modal-input" placeholder="Email">
            <select id="edit-status" class="modal-input">
                <option value="PAID">PAID</option>
                <option value="LEAD">LEAD</option>
                <option value="CANCEL">CANCEL</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <button class="btn-gold" style="background: #333; color: white;" onclick="closeModal()">Hủy</button>
                <button class="btn-gold" onclick="saveEdit()">Cập nhật</button>
            </div>
        </div>
    </div>

    <script>
        let allData = []; let displayData = [];
        function checkLogin() {
            if (document.getElementById('admin-pass').value === 'admin7day') {
                localStorage.setItem('admin_pw', 'admin7day'); init();
            } else alert('Sai!');
        }
        function init() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            document.getElementById('search').value = ''; 
            loadData(); loadCMS();
        }
        async function loadData() {
            try {
                const res = await fetch('/api/admin?pw=admin7day&t=' + Date.now());
                const result = await res.json();
                if (result.success) { allData = result.data; refreshUI(); }
            } catch(e) { console.error('Lỗi load data:', e); }
        }
        function refreshUI() {
            const key = document.getElementById('search').value.toLowerCase();
            displayData = allData.filter(s => s.fullname.toLowerCase().includes(key) || s.phone.includes(key));
            document.getElementById('list').innerHTML = displayData.map((s, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${s.timestamp}</td>
                    <td><b>${s.fullname}</b><br><small>${s.phone}</small></td>
                    <td><span class="status-pill pill-${s.status.toLowerCase()}">${s.status}</span></td>
                    <td>
                        <button class="action-btn" onclick="openEdit(${i})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" onclick="deleteS(${i})" style="color:red;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
            const paid = allData.filter(s => s.status === 'PAID').length;
            document.getElementById('stat-total').innerText = allData.length;
            document.getElementById('stat-paid').innerText = paid;
            document.getElementById('stat-rev').innerText = (paid * 199000).toLocaleString() + 'đ';
        }
        function openEdit(i) {
            const s = displayData[i]; if (!s) return;
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('old-phone').value = s.phone;
            document.getElementById('edit-name').value = s.fullname;
            document.getElementById('edit-phone').value = s.phone;
            document.getElementById('edit-email').value = s.email;
            document.getElementById('edit-status').value = s.status;
        }
        async function saveEdit() {
            const data = {
                action: 'update-student', pw: 'admin7day',
                oldPhone: document.getElementById('old-phone').value,
                fullname: document.getElementById('edit-name').value,
                phone: document.getElementById('edit-phone').value,
                email: document.getElementById('edit-email').value,
                status: document.getElementById('edit-status').value
            };
            const res = await fetch('/api/admin', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if ((await res.json()).success) { alert('Xong!'); closeModal(); loadData(); }
        }
        async function deleteS(i) {
            const s = displayData[i]; if (!s || !confirm('Xóa?')) return;
            const res = await fetch('/api/admin', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: 'delete-student', phone: s.phone, pw: 'admin7day'}) });
            if ((await res.json()).success) { alert('Đã xóa!'); loadData(); }
        }
        async function loadCMS() {
            const container = document.getElementById('cms-fields');
            container.innerHTML = '<div style="color:var(--accent)">Đang tải cấu hình website...</div>';
            try {
                const res = await fetch('/api/config?t=' + Date.now());
                const config = await res.json();
                if (Object.keys(config).length === 0) {
                    container.innerHTML = '<div style="color:red">Không tìm thấy sheet "Config" (Lưu ý: Sheet phải có tên chính xác là "Config" hoặc "config").</div>';
                    return;
                }
                container.innerHTML = Object.keys(config).map(k => `
                    <div class="stat-card">
                        <label style="font-size: 11px; color: var(--accent);">${k}</label>
                        <textarea id="cms-${k}">${config[k] || ""}</textarea>
                    </div>
                `).join('');
            } catch(e) { 
                container.innerHTML = '<div style="color:red">Lỗi khi tải CMS. Vui lòng kiểm tra lại link Google Apps Script!</div>';
            }
        }
        async function saveCMS() {
            const config = {}; document.querySelectorAll('#tab-cms textarea').forEach(t => config[t.id.replace('cms-', '')] = t.value);
            const res = await fetch('/api/admin', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: 'update-config', config, pw: 'admin7day'}) });
            if ((await res.json()).success) alert('Đã lưu!');
        }
        function switchTab(t) {
            document.getElementById('tab-leads').style.display = t === 'leads' ? 'block' : 'none';
            document.getElementById('tab-cms').style.display = t === 'cms' ? 'block' : 'none';
            document.getElementById('btn-leads').classList.toggle('active', t === 'leads');
            document.getElementById('btn-cms').classList.toggle('active', t === 'cms');
        }
        function exportCSV() {
            const headers = "STT,Ghi danh,Ho ten,SDT,Email,Trang thai\n";
            const rows = displayData.map((s, i) => `${i+1},"${s.timestamp}","${s.fullname}","${s.phone}","${s.email}","${s.status}"`).join("\n");
            const blob = new Blob(["\ufeff" + headers + rows], {type: 'text/csv;charset=utf-8;'});
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Data_Hoc_Vien.csv"; link.click();
        }
        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
        function logout() { localStorage.removeItem('admin_pw'); location.reload(); }
        if (localStorage.getItem('admin_pw')) init();
    </script>
</body>
</html>
