<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Multi-CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #06403D;
            --accent: #FFD700;
            --bg: #0a0f0e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
            --muted: #888;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 250px;
            background: rgba(0,0,0,0.5);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--muted);
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--card-bg);
            color: var(--accent);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.2); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* Tables */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th { text-align: left; padding: 20px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:last-child td { border-bottom: none; }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        .tag-success { background: rgba(46,204,113,0.1); color: var(--success); }
        .tag-pending { background: rgba(241,196,15,0.1); color: #f1c40f; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #111;
            padding: 35px;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            box-sizing: border-box;
        }

        /* Responsive */
        @media (max-width: 768px) {
            aside { display: none; }
            main { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand">MULTI-CRM</div>
        <div class="nav-item active" onclick="switchTab('products')"><i class="fas fa-box"></i> Sản phẩm</div>
        <div class="nav-item" onclick="switchTab('customers')"><i class="fas fa-users"></i> Khách hàng</div>
        <div class="nav-item" onclick="switchTab('orders')"><i class="fas fa-shopping-cart"></i> Đơn hàng</div>
    </aside>

    <main>
        <header>
            <h1 id="tab-title">Sản phẩm</h1>
            <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Thêm mới</button>
        </header>

        <div class="card">
            <table id="data-table">
                <!-- Content generated by JS -->
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <!-- Modal -->
    <div id="crud-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Thêm mới</h2>
            <form id="crud-form" onsubmit="saveData(event)">
                <input type="hidden" id="item-id">
                <div id="form-fields">
                    <!-- Fields generated by JS -->
                </div>
                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex:1">Hủy</button>
                    <button type="submit" class="btn" style="flex:1">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'products';
        let dbData = { products: [], customers: [], orders: [] };

        async function loadData() {
            try {
                const res = await fetch('/api/admin?pw=admin7day');
                const result = await res.json();
                if (result.success) {
                    dbData = result.data;
                    renderTable();
                }
            } catch (e) { 
                console.error('Load error:', e);
                alert("❌ LỖI TẢI DỮ LIỆU!\n\nNếu bạn đang xem trên Vercel: Vui lòng kiểm tra đã cấu hình TURSO_URL và TURSO_TOKEN chưa.\n\nNếu đang chạy Local: Đảm bảo server đang bật và brain.db tồn tại.");
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const titles = { products: 'Sản phẩm', customers: 'Khách hàng', orders: 'Đơn hàng' };
            document.getElementById('tab-title').innerText = titles[tab];
            
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('data-table');
            const thead = container.querySelector('thead');
            const tbody = container.querySelector('tbody');
            
            if (currentTab === 'products') {
                thead.innerHTML = '<tr><th>ID</th><th>Tên sản phẩm</th><th>Giá</th><th>Kho</th><th>Thao tác</th></tr>';
                tbody.innerHTML = dbData.products.map(p => `
                    <tr>
                        <td>#${p.id}</td>
                        <td><b>${p.name}</b></td>
                        <td>${p.price.toLocaleString()}đ</td>
                        <td>${p.stock}</td>
                        <td>
                            <button class="btn btn-outline" style="padding:5px 10px" onclick="editItem('product', ${p.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-outline" style="padding:5px 10px; color:var(--danger)" onclick="deleteItem('product', ${p.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } else if (currentTab === 'customers') {
                thead.innerHTML = '<tr><th>ID</th><th>Họ tên</th><th>Liên hệ</th><th>Ngày đăng ký</th><th>Thao tác</th></tr>';
                tbody.innerHTML = dbData.customers.map(c => `
                    <tr>
                        <td>#${c.id}</td>
                        <td><b>${c.fullname}</b></td>
                        <td>${c.phone}<br><small>${c.email || ''}</small></td>
                        <td>${new Date(c.registration_date).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-outline" style="padding:5px 10px" onclick="editItem('customer', ${c.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-outline" style="padding:5px 10px; color:var(--danger)" onclick="deleteItem('customer', ${c.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } else if (currentTab === 'orders') {
                thead.innerHTML = '<tr><th>ID</th><th>Khách hàng</th><th>Sản phẩm</th><th>Số tiền</th><th>Trạng thái</th><th>Thao tác</th></tr>';
                tbody.innerHTML = dbData.orders.map(o => `
                    <tr>
                        <td>#${o.id}</td>
                        <td><b>${o.customer_name}</b></td>
                        <td>${o.product_name}</td>
                        <td>${o.amount.toLocaleString()}đ</td>
                        <td><span class="tag tag-${o.status}">${o.status}</span></td>
                        <td>
                            <button class="btn btn-outline" style="padding:5px 10px" onclick="editItem('order', ${o.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-outline" style="padding:5px 10px; color:var(--danger)" onclick="deleteItem('order', ${o.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function openModal() {
            const formFields = document.getElementById('form-fields');
            document.getElementById('modal-title').innerText = 'Thêm ' + currentTab;
            document.getElementById('item-id').value = '';
            
            if (currentTab === 'products') {
                formFields.innerHTML = `
                    <div class="form-group"><label>Tên sản phẩm</label><input type="text" name="name" required></div>
                    <div class="form-group"><label>Giá bán</label><input type="number" name="price" required></div>
                    <div class="form-group"><label>Mô tả</label><textarea name="description"></textarea></div>
                    <div class="form-group"><label>Số lượng kho</label><input type="number" name="stock" required></div>
                `;
            } else if (currentTab === 'customers') {
                formFields.innerHTML = `
                    <div class="form-group"><label>Họ và tên</label><input type="text" name="fullname" required></div>
                    <div class="form-group"><label>Số điện thoại</label><input type="text" name="phone" required></div>
                    <div class="form-group"><label>Email</label><input type="email" name="email"></div>
                    <div class="form-group"><label>Zalo</label><input type="text" name="zalo"></div>
                `;
            } else if (currentTab === 'orders') {
                formFields.innerHTML = `
                    <div class="form-group"><label>Khách hàng</label><select name="customer_id" required>${dbData.customers.map(c => `<option value="${c.id}">${c.fullname}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Sản phẩm</label><select name="product_id" required>${dbData.products.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Số tiền</label><input type="number" name="amount" required></div>
                    <div class="form-group"><label>Trạng thái</label><select name="status"><option value="pending">Pending</option><option value="success">Success</option></select></div>
                `;
            }
            
            document.getElementById('crud-modal').style.display = 'flex';
        }

        function editItem(type, id) {
            openModal();
            document.getElementById('modal-title').innerText = 'Chỉnh sửa ' + type;
            document.getElementById('item-id').value = id;
            
            const data = dbData[type + 's'].find(x => x.id === id);
            const form = document.getElementById('crud-form');
            
            for (let key in data) {
                if (form.elements[key]) form.elements[key].value = data[key];
            }
        }

        async function saveData(e) {
            e.preventDefault();
            const form = e.target;
            const id = document.getElementById('item-id').value;
            const payload = Object.fromEntries(new FormData(form).entries());
            if (id) payload.id = id;

            const res = await fetch('/api/admin?pw=admin7day', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: id ? 'update' : 'create',
                    type: currentTab.replace(/s$/, ''),
                    payload
                })
            });

            if ((await res.json()).success) {
                closeModal();
                loadData();
            }
        }

        async function deleteItem(type, id) {
            if (!confirm('Bạn có chắc muốn xóa mục này?')) return;
            const res = await fetch('/api/admin?pw=admin7day', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'delete', type, payload: { id } })
            });
            if ((await res.json()).success) loadData();
        }

        function closeModal() { document.getElementById('crud-modal').style.display = 'none'; }
        
        loadData();
    </script>
</body>
</html>
